<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
</head>
<body>
  <div id="app">
    <div id="password-modal" class="modal hidden">
      <div class="modal-content">
        <h2 id="modal-title">Welcome</h2>
        <p id="modal-description">Set your password to protect your data</p>
        <form id="password-form">
          <input type="password" id="password-input" placeholder="Enter password" autocomplete="new-password">
          <div id="confirm-password-group" class="hidden">
            <input type="password" id="confirm-password-input" placeholder="Confirm password" autocomplete="new-password">
          </div>
          <button type="submit" id="password-submit">Continue</button>
          <p id="error-message" class="error hidden"></p>
        </form>
      </div>
    </div>

    <main id="main-content" class="hidden">
      <div id="background" class="background"></div>
      <div class="overlay"></div>
      <button id="refresh-bg" class="refresh-bg" title="New background">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 4v6h-6"></path>
          <path d="M1 20v-6h6"></path>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
      </button>
      
      <div class="content">
        <div class="top-section">
          <div id="clock" class="clock">
            <h1 id="time"></h1>
            <p id="date"></p>
          </div>
        </div>

        <div class="search-section">
          <div class="search-box">
            <button id="search-engine-btn" class="search-engine-btn" title="Select search engine">
              <span id="current-engine-icon"></span>
              <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </button>
            <div id="search-engine-dropdown" class="dropdown search-engine-dropdown">
              <div id="search-engine-list"></div>
            </div>
            <input type="text" id="search-input" placeholder="Search the web..." autocomplete="off">
            <button id="search-btn" class="search-btn" title="Search">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
            </button>
          </div>
        </div>

        <div class="middle-section">
          <div id="shortcuts" class="shortcuts"></div>
        </div>

        <div class="bottom-section">
          <div id="todo-list" class="todo-list">
            <button class="todo-header">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
              </svg>
              <span>To-Do List</span>
              <span id="todo-count" class="todo-count">0/0</span>
            </button>
            <div id="todo-content" class="todo-content">
              <div class="todo-input-group">
                <input type="text" id="todo-input" placeholder="Add a task...">
                <button id="add-todo-btn" class="icon-btn primary">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                  </svg>
                </button>
              </div>
              <div id="todo-items" class="todo-items"></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="shortcut-modal" class="modal hidden">
      <div class="modal-content">
        <h2 id="shortcut-modal-title">Add Shortcut</h2>
        <form id="shortcut-form">
          <input type="text" id="shortcut-name-input" placeholder="Name">
          <input type="text" id="shortcut-url-input" placeholder="URL (e.g., example.com)">
          <input type="text" id="shortcut-icon-input" placeholder="Icon URL or SVG (optional)">
          <div class="modal-actions">
            <button type="button" id="shortcut-cancel" class="btn-secondary">Cancel</button>
            <button type="submit" id="shortcut-save" class="btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
  </div>
  
  <script type="module" src="/scripts/main.js"></script>
</body>
</html>
